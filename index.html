<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abako Pro - Gestão Financeira</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: #f8fafc;
        }
        .glass-effect {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .transaction-card:hover .delete-btn { opacity: 1; }
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="text-slate-900">

    <nav class="sticky top-0 z-50 glass-effect border-b border-slate-200 px-6 py-4">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-10 h-10 bg-indigo-600 rounded-xl flex items-center justify-center shadow-lg shadow-indigo-200">
                    <svg class="w-6 h-6 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                </div>
                <span class="text-xl font-800 tracking-tight text-slate-800">Abako<span class="text-indigo-600">Pro</span></span>
            </div>
            <button onclick="clearAll()" class="text-xs font-bold text-rose-500 hover:bg-rose-50 px-4 py-2 rounded-lg transition-all border border-rose-100 uppercase tracking-widest">
                Redefinir Dados
            </button>
        </div>
    </nav>

    <main class="max-w-7xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10">
            <div class="bg-gradient-to-br from-indigo-600 to-indigo-700 p-8 rounded-[2rem] shadow-2xl shadow-indigo-200 text-white relative overflow-hidden group">
                <div class="relative z-10">
                    <p class="text-indigo-100 text-sm font-semibold mb-1 opacity-80">Saldo Disponível</p>
                    <h2 id="total-balance" class="text-4xl font-800 tracking-tight">R$ 0,00</h2>
                </div>
                <svg class="absolute -right-4 -bottom-4 w-32 h-32 text-indigo-500 opacity-20 group-hover:scale-110 transition-transform" fill="currentColor" viewBox="0 0 20 20"><path d="M2 10a8 8 0 018-8v8h8a8 8 0 11-16 0z"/><path d="M12 2.252A8.014 8.014 0 0117.748 8H12V2.252z"/></svg>
            </div>
            
            <div class="bg-white p-8 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 flex items-center gap-6">
                <div class="w-14 h-14 bg-emerald-100 text-emerald-600 rounded-2xl flex items-center justify-center">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M5 10l7-7m0 0l7 7m-7-7v18"/></svg>
                </div>
                <div>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Total Entradas</p>
                    <h2 id="total-income" class="text-2xl font-bold text-emerald-600">R$ 0,00</h2>
                </div>
            </div>

            <div class="bg-white p-8 rounded-[2rem] shadow-xl shadow-slate-200/50 border border-slate-100 flex items-center gap-6">
                <div class="w-14 h-14 bg-rose-100 text-rose-600 rounded-2xl flex items-center justify-center">
                    <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M19 14l-7 7m0 0l-7-7m7 7V3"/></svg>
                </div>
                <div>
                    <p class="text-slate-400 text-xs font-bold uppercase tracking-widest">Total Saídas</p>
                    <h2 id="total-expense" class="text-2xl font-bold text-rose-600">R$ 0,00</h2>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-10">
            <aside class="lg:col-span-4 space-y-6">
                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-slate-200/60 border border-slate-100">
                    <h3 class="text-xl font-800 mb-8 text-slate-800 flex items-center gap-2">
                        Nova Transação
                        <span class="w-2 h-2 bg-indigo-500 rounded-full animate-pulse"></span>
                    </h3>
                    <form id="finance-form" class="space-y-6">
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-500 ml-1">Descrição</label>
                            <input type="text" id="desc" placeholder="Ex: Aluguel, Job..." class="w-full px-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-indigo-500 outline-none transition-all font-medium" required>
                        </div>
                        <div class="space-y-2">
                            <label class="text-sm font-bold text-slate-500 ml-1">Valor</label>
                            <div class="relative">
                                <span class="absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 font-bold">R$</span>
                                <input type="number" step="0.01" id="amount" placeholder="0,00" class="w-full pl-12 pr-5 py-4 bg-slate-50 border-2 border-transparent rounded-2xl focus:bg-white focus:border-indigo-500 outline-none transition-all font-bold text-lg" required>
                            </div>
                        </div>
                        <div class="flex p-1 bg-slate-100 rounded-2xl">
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="type" value="income" class="hidden peer" checked>
                                <div class="text-center py-3 rounded-xl transition-all peer-checked:bg-white peer-checked:text-emerald-600 peer-checked:shadow-sm font-bold text-slate-500 text-sm">Entrada</div>
                            </label>
                            <label class="flex-1 cursor-pointer">
                                <input type="radio" name="type" value="expense" class="hidden peer">
                                <div class="text-center py-3 rounded-xl transition-all peer-checked:bg-white peer-checked:text-rose-600 peer-checked:shadow-sm font-bold text-slate-500 text-sm">Saída</div>
                            </label>
                        </div>
                        <button type="submit" class="w-full bg-slate-900 hover:bg-indigo-600 text-white font-bold py-5 rounded-[1.5rem] shadow-lg shadow-slate-200 transition-all active:scale-[0.98] transform flex items-center justify-center gap-3">
                            Confirmar Lançamento
                        </button>
                    </form>
                </div>

                <div class="bg-white p-8 rounded-[2.5rem] shadow-xl shadow-blue-100 border border-blue-50">
                    <div class="flex items-center gap-3 mb-4">
                        <div class="w-10 h-10 bg-blue-500 rounded-full flex items-center justify-center">
                            <svg class="w-6 h-6 text-white" fill="currentColor" viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>
                        </div>
                        <h4 class="font-800 text-slate-800">Apoie o Projeto</h4>
                    </div>
                    <p class="text-slate-500 text-sm leading-relaxed mb-6">
                        Gostou do <strong>Abako Pro</strong>? Contribua para manter este projeto gratuito e em constante evolução.
                    </p>
                    <a href="https://mpago.la/1rYprSD" target="_blank" class="block w-full bg-[#009EE3] hover:bg-[#007EAF] text-white text-center font-bold py-4 rounded-2xl transition-all shadow-lg shadow-blue-100 flex items-center justify-center gap-2 group">
                        Apoiar via Mercado Pago
                        <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"/></svg>
                    </a>
                    <p class="text-[10px] text-center text-slate-400 mt-4 font-semibold uppercase tracking-widest">Pagamento 100% Seguro</p>
                </div>
            </aside>

            <div class="lg:col-span-8">
                <div class="bg-white rounded-[2.5rem] shadow-xl shadow-slate-200/60 border border-slate-100 overflow-hidden">
                    <div class="px-8 py-7 border-b border-slate-50 flex justify-between items-center bg-white/50">
                        <h3 class="text-xl font-800 text-slate-800">Fluxo Recente</h3>
                        <span id="item-count" class="text-xs font-bold text-slate-400 bg-slate-100 px-3 py-1 rounded-full uppercase">0 Transações</span>
                    </div>
                    <div id="transaction-list" class="divide-y divide-slate-50 max-h-[700px] overflow-y-auto">
                        </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const form = document.getElementById('finance-form');
        const list = document.getElementById('transaction-list');
        const balanceEl = document.getElementById('total-balance');
        const incomeEl = document.getElementById('total-income');
        const expenseEl = document.getElementById('total-expense');
        const countEl = document.getElementById('item-count');

        let transactions = JSON.parse(localStorage.getItem('abako_pro_data')) || [];

        function updateUI() {
            const income = transactions.filter(t => t.type === 'income').reduce((acc, t) => acc + t.amount, 0);
            const expense = transactions.filter(t => t.type === 'expense').reduce((acc, t) => acc + t.amount, 0);
            const total = income - expense;

            balanceEl.innerText = formatCurrency(total);
            incomeEl.innerText = formatCurrency(income);
            expenseEl.innerText = formatCurrency(expense);
            countEl.innerText = `${transactions.length} ${transactions.length === 1 ? 'TRANSAÇÃO' : 'TRANSAÇÕES'}`;

            localStorage.setItem('abako_pro_data', JSON.stringify(transactions));
            renderTransactions();
        }

        function formatCurrency(value) {
            return value.toLocaleString('pt-BR', { style: 'currency', currency: 'BRL' });
        }

        function renderTransactions() {
            if (transactions.length === 0) {
                list.innerHTML = `
                    <div class="py-32 flex flex-col items-center justify-center text-slate-300">
                        <div class="w-20 h-20 bg-slate-50 rounded-full flex items-center justify-center mb-4">
                            <svg class="w-10 h-10" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
                        </div>
                        <p class="font-bold uppercase tracking-widest text-xs">Aguardando movimentações...</p>
                    </div>`;
                return;
            }

            list.innerHTML = '';
            transactions.forEach((t, index) => {
                const isIncome = t.type === 'income';
                const div = document.createElement('div');
                div.className = 'px-8 py-6 flex items-center justify-between transaction-card hover:bg-slate-50/80 transition-all group';
                div.innerHTML = `
                    <div class="flex items-center gap-5">
                        <div class="w-12 h-12 rounded-2xl flex items-center justify-center ${isIncome ? 'bg-emerald-50 text-emerald-600' : 'bg-rose-50 text-rose-600'}">
                            ${isIncome ? '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M7 11l5-5m0 0l5 5m-5-5v12"/></svg>' : '<svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-width="2.5" d="M17 13l-5 5m0 0l-5-5m5 5V6"/></svg>'}
                        </div>
                        <div>
                            <p class="font-bold text-slate-700 text-lg leading-tight group-hover:text-indigo-600 transition-colors">${t.desc}</p>
                            <p class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter mt-1 opacity-70">${t.date}</p>
                        </div>
                    </div>
                    <div class="flex items-center gap-8">
                        <span class="font-800 text-lg ${isIncome ? 'text-emerald-600' : 'text-rose-600'}">
                            ${isIncome ? '+' : '-'} ${formatCurrency(t.amount)}
                        </span>
                        <button onclick="removeTransaction(${index})" class="delete-btn opacity-0 p-2.5 text-slate-300 hover:text-rose-500 hover:bg-rose-50 rounded-xl transition-all">
                            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                        </button>
                    </div>`;
                list.appendChild(div);
            });
        }

        function removeTransaction(index) {
            transactions.splice(index, 1);
            updateUI();
        }

        function clearAll() {
            if(confirm("Deseja apagar todos os dados permanentemente?")) {
                transactions = [];
                updateUI();
            }
        }

        form.addEventListener('submit', (e) => {
            e.preventDefault();
            const desc = document.getElementById('desc').value;
            const amount = parseFloat(document.getElementById('amount').value);
            const type = document.querySelector('input[name="type"]:checked').value;
            const date = new Date().toLocaleString('pt-BR', { day: '2-digit', month: '2-digit', year: 'numeric', hour: '2-digit', minute: '2-digit' });

            transactions.unshift({ desc, amount, type, date });
            form.reset();
            updateUI();
        });

        updateUI();
    </script>
</body>
</html>
